name: 'ECR Public Cleanup'
description:
  'Delete orphan untagged images from an AWS ECR Public repository, preserving
  manifest-list children'
author: 'deployport'

branding:
  icon: trash-2
  color: orange

inputs:
  repository:
    description: 'ECR Public repository name, e.g. gatun/agent'
    required: true
  dry-run:
    description:
      'If true, log what would be deleted but do not call batch-delete-image.'
    required: false
    default: 'false'

outputs:
  deleted-count:
    description: 'Number of digests deleted (0 when dry-run is true).'
  kept-count:
    description:
      'Number of untagged digests preserved because they are referenced by a
      tagged manifest list.'
  deleted-digests:
    description:
      'Newline-separated list of deleted (or would-be-deleted, in dry-run)
      digests.'

runs:
  using: node24
  main: dist/index.js
